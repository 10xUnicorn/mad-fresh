<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Mad Fresh Kitchen — Offline</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #75F663;
      margin-bottom: 48px;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      opacity: 0.5;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .retry-btn {
      background: #75F663;
      color: #0a0a0a;
      border: none;
      border-radius: 12px;
      padding: 14px 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s ease;
    }

    .retry-btn:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="logo">MADFRESH</div>

  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>

  <h1>You're offline</h1>
  <p>Check your internet connection and try again to browse the menu.</p>

  <button class="retry-btn" onclick="location.reload()">Retry</button>
</body>
</html>
